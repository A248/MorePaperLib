name: Java CI

on:
  push:
    branches: [ '*' ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: 'zulu'
        cache: 'maven'
    - name: Build with Maven
      run: mvn -B -U clean verify
