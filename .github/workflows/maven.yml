name: Java CI

on:
  push:
    branches: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: 'zulu'
        show-download-progress: true
    - name: Build with Maven
      run: ./mvnw -B -U clean verify
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: deployment
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
          show-download-progress: true
          server-id: cloudsmith-deploy
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Build with Maven
        run: ./mvnw clean -B -U deploy -DskipTests -Dinvoker.skip=true
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_DEPLOY_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_DEPLOY_PASS }}
